server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: trade-service

  datasource:
    url: ${TRADE_DB_URL:jdbc:postgresql://localhost:5432/trade_db}
    username: ${TRADE_DB_USERNAME:postgres}
    password: ${TRADE_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}

trade:
  listing-events:
    queue: trade.listing.events.queue
  billing-events:
    queue: trade.billing.events.queue

user-service:
  base-url: ${USER_SERVICE_URL:http://localhost:8080}

billing-service:
  base-url: ${BILLING_SERVICE_URL:http://localhost:8083}

springdoc:
  api-docs:
    path: /trades/v3/api-docs
  swagger-ui:
    path: /trades/swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

logging:
  level:
    root: INFO
    com.energy.marketplace: DEBUG
