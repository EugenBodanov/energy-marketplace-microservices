server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: user-service

  datasource:
    url: ${USER_DB_URL:jdbc:postgresql://localhost:5432/users_db}
    username: ${USER_DB_USERNAME:postgres}
    password: ${USER_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

app:
  jwt:
    secret: ${APP_JWT_SECRET:local-development-user-service-jwt-secret}
    issuer: ${APP_JWT_ISSUER:user-service}
    expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES:60}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
