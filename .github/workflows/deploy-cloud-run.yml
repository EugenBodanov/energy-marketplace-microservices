name: Build images and deploy dev with Terraform

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: dev-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  ZONE: ${{ secrets.GCP_ZONE }}
  GAR_LOCATION: ${{ secrets.GAR_LOCATION }}
  GAR_REPOSITORY: ${{ secrets.GAR_REPOSITORY }}
  WIF_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  DEPLOY_SERVICE_ACCOUNT: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}
  TERRAFORM_DIR: infra/terraform/envs/dev
  TF_STATE_BUCKET_SUFFIX: energy-marketplace-tfstate
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"

jobs:
  test:
    name: Test ${{ matrix.service_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - service_name: api-gateway
            service_path: api-gateway
            runtime: java
          - service_name: user-service
            service_path: user
            runtime: java
          - service_name: listing-service
            service_path: listing
            runtime: java
          - service_name: trade-service
            service_path: trade
            runtime: java
          - service_name: billing-service
            service_path: billing
            runtime: python

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        if: matrix.runtime == 'java'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Setup Python 3.12
        if: matrix.runtime == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ${{ matrix.service_path }}/requirements.txt

      - name: Run Java tests
        if: matrix.runtime == 'java'
        run: mvn -B -pl "${{ matrix.service_path }}" -am test

      - name: Run Python tests
        if: matrix.runtime == 'python'
        working-directory: ${{ matrix.service_path }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pytest

  deploy:
    name: Build images and terraform apply dev
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        shell: bash
        run: |
          missing=0

          for name in PROJECT_ID REGION GAR_LOCATION GAR_REPOSITORY WIF_PROVIDER DEPLOY_SERVICE_ACCOUNT; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is empty. Check repository secrets."
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOY_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "$GAR_LOCATION-docker.pkg.dev" --quiet

      - name: Build and push Docker images
        shell: bash
        run: |
          IMAGE_PREFIX="$GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$GAR_REPOSITORY"

          declare -A SERVICE_PATHS=(
            ["api-gateway"]="api-gateway"
            ["user-service"]="user"
            ["listing-service"]="listing"
            ["trade-service"]="trade"
            ["billing-service"]="billing"
          )

          declare -A SERVICE_CONTEXTS=(
            ["api-gateway"]="api-gateway"
            ["user-service"]="user"
            ["listing-service"]="."
            ["trade-service"]="."
            ["billing-service"]="billing"
          )

          for service in api-gateway user-service listing-service trade-service billing-service; do
            image="$IMAGE_PREFIX/$service:$GITHUB_SHA"
            docker build -t "$image" -f "./${SERVICE_PATHS[$service]}/Dockerfile" "${SERVICE_CONTEXTS[$service]}"
            docker push "$image"
          done

      - name: Terraform init
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${PROJECT_ID}-${TF_STATE_BUCKET_SUFFIX}" \
            -backend-config="prefix=infra/terraform/envs/dev"

      - name: Terraform fmt
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform validate
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform validate

      - name: Write Terraform image variables
        working-directory: ${{ env.TERRAFORM_DIR }}
        shell: bash
        run: |
          IMAGE_PREFIX="$GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$GAR_REPOSITORY"
          TF_ZONE="${ZONE:-${REGION}-b}"

          cat > ci.auto.tfvars <<EOF
          project_id = "$PROJECT_ID"
          region     = "$REGION"
          zone       = "$TF_ZONE"
          environment = "dev"

          service_images = {
            "api-gateway"     = "$IMAGE_PREFIX/api-gateway:$GITHUB_SHA"
            "user-service"    = "$IMAGE_PREFIX/user-service:$GITHUB_SHA"
            "listing-service" = "$IMAGE_PREFIX/listing-service:$GITHUB_SHA"
            "trade-service"   = "$IMAGE_PREFIX/trade-service:$GITHUB_SHA"
            "billing-service" = "$IMAGE_PREFIX/billing-service:$GITHUB_SHA"
          }
          EOF

      - name: Terraform plan
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform plan -out=dev.tfplan

      - name: Terraform apply
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform apply -auto-approve dev.tfplan
