name: start-rabbitmq-vm

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: Google Cloud project ID. Falls back to GCP_PROJECT_ID secret when empty.
        required: false
        type: string
      zone:
        description: RabbitMQ VM zone
        required: true
        default: europe-west1-b
        type: string
      instance_name:
        description: RabbitMQ VM instance name
        required: true
        default: em-dev-rabbitmq
        type: string

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ inputs.project_id || secrets.GCP_PROJECT_ID }}
  WIF_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  DEPLOY_SERVICE_ACCOUNT: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

jobs:
  start:
    name: Start RabbitMQ VM
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Validate inputs
        shell: bash
        run: |
          if [ -z "$PROJECT_ID" ]; then
            echo "::error::Set workflow input project_id or GitHub secret GCP_PROJECT_ID."
            exit 1
          fi

          for name in WIF_PROVIDER DEPLOY_SERVICE_ACCOUNT; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is empty. Check repository secrets."
              exit 1
            fi
          done

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOY_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Start VM
        run: |
          gcloud compute instances start "${{ inputs.instance_name }}" \
            --project "$PROJECT_ID" \
            --zone "${{ inputs.zone }}" \
            --quiet
